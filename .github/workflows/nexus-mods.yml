name: Nexus Mods

on:
  push:
    tags:
    - 'v*.*.*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1

    - name: Download the release asset
      run: |
        RELEASE_ASSET_NAME="ui-species-names_${VERSION#v}.zip"
        wget "https://github.com/hmlendea/stellaris-ui-species-names/releases/download/${VERSION}/${RELEASE_ASSET_NAME}" -O "release.zip"

    - name: Upload
      uses: Nexus-Mods/upload-action@v1.0.0-beta.3
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 920143
        filename: release.zip
        display_name: ui-species-names.zip
        version: ${{github.ref_name}}
        file_category: main
